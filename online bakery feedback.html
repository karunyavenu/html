
    <!DOCTYPE html>
<html lang="en">
<head>
    <title>Online Bakery Feedback Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Bakery Feedback Form</h2>

    <form>

        
        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" class="form-control" placeholder="Enter your name">
        </div>

        
        <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" placeholder="Enter your email">
        </div>

       
        <div class="form-group">
            <label>Feedback</label>
            <textarea class="form-control" rows="4" placeholder="Write your feedback"></textarea>
        </div>

        
        <div class="form-group">
            <label>Preferred Contact Method</label><br>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="contact" id="email">
                <label class="form-check-label" for="email">Email</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="contact" id="phone">
                <label class="form-check-label" for="phone">Phone</label>
            </div>
        </div>

        
        <div class="form-group">
            <label>Satisfaction Level (1–10)</label>
            <input type="range" class="form-control-range" min="1" max="10">
        </div>

        
        <div class="form-group">
            <label>Order Type</label>
            <select class="form-control">
                <option>Cake</option>
                <option>Cookies</option>
                <option>Pastries</option>
            </select>
        </div>

        
        <button type="submit" class="btn btn-primary btn-block">
            Submit Feedback
        </button>

    </form>
</div>

</body>
</html>
