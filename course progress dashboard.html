<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/bootstrap.css">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <title>progress dashboard</title>
</head>
<body>
    <div class="container" text-center
<nav>
    <ul class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item"><a href="#">courses</a></li>
        <li class="breadcrumb-item active"aria-current="page">web develpoment</li>

    </ul>
</nav>
 <h3 class="mb-4">
            Web Development Course
            <span class="badge bg-success">New</span>
        </h3>
         <label class="container">HTML - 100%</label>
        <div class="progress mb-3">
            <div class="progress-bar bg-success progress-bar-striped"
                 style="width:100%">
                100% Complete
            </div>
        </div>
        <label class="container">CSS - 75%</label>
        <div class="progress mb-3">
            <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated"
                 style="width:75%">
                75% Complete
            </div>
        </div>
        <label class="container">JavaScript - 50%</label>
        <div class="progress mb-3">
            <div class="progress-bar bg-warning"
                 style="width:50%">
                50% Complete
            </div>
        </div>
         <label class="container">Bootstrap - 25%</label>
        <div class="progress mb-4">
            <div class="progress-bar bg-danger"
                 style="width:25%">
                25% Complete
            </div>
        </div>
    <button type="button" class="btn btn-primary">Start</button>
    <button type="button" class="btn btn-success">Pause</button>
    <button type="button" class="btn btn-danger">Reset</button>
 <div class="d-flex justify-content-center mt-4">
  <ul class="pagination"
    <li class="page-item"><a class="page-link" href="#">Previous</a></li>
    <li class="page-item active"><a class="page-link" href="#">1</a></li>
    <li class="page-item"><a class="page-link" href="#">2</a></li>
    <li class="page-item disabled"><a class="page-link" href="#">3</a></li>
    <li class="page-item"><a class="page-link" href="#">Next</a></li>
 </ul>
    </div>














    <script src="/js/bootstrap.bundle.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
